<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF Demo</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

    <h2>LINE 使用者資訊</h2>
    <p id="userId">userId: </p>
    <p id="name">name: </p>
    <img id="avatar" width="100" />

    <script>
        liff.init({
            liffId: '2009518520-I9r9w3Ic'
        }).then(() => {

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            liff.getProfile().then(profile => {
                // ⭐ 顯示在畫面上
                document.getElementById("userId").innerText = "userId: " + profile.userId;
                document.getElementById("name").innerText = "name: " + profile.displayName;
                document.getElementById("avatar").src = profile.pictureUrl;
            });

        }).catch(err => {
            document.body.innerHTML += "<p style='color:red;'>錯誤：" + err + "</p>";
        });
    </script>

</body>
</html>
